# ============================================================
#  DATASOURCE CONFIGURATION (PostgreSQL via environment)
# ============================================================

# JDBC URL – uses environment variable to keep credentials out of version control.
# Format: jdbc:postgresql://host:port/database
spring.datasource.url=${SPRING_DATASOURCE_URL}

# Database username – injected via environment.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}

# Database password – injected via environment.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Fully qualified driver class name for PostgreSQL.
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
#  JPA / HIBERNATE (Schema management)
# ============================================================

# Disable Hibernate's automatic DDL generation (we manage schema manually).
# 'none' means Hibernate will not create/update/validate tables.
spring.jpa.hibernate.ddl-auto=none

# ============================================================
#  SQL INITIALIZATION (Schema creation)
# ============================================================

# Always run the schema.sql (and data.sql if present) on startup.
# This ensures the 'books' table exists before the app uses it.
spring.sql.init.mode=always

# ============================================================
#  EXCEPTION HANDLING (404 for unmapped endpoints)
# ============================================================

# Throw NoHandlerFoundException when a request has no matching handler.
# This lets GlobalExceptionHandler return a JSON error response for 404s.
spring.mvc.throw-exception-if-no-handler-found=true

# Disable static resource mappings (e.g., /webjars/, /**, etc.) so that
# no default handler catches unmatched requests – ensures the above 404
# handling is effective and doesn't fall back to a default welcome page.
spring.web.resources.add-mappings=false
# PostgreSQL connection (values from environment)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema managed via schema.sql only (no Hibernate auto-DDL)
spring.jpa.hibernate.ddl-auto=none

# Run schema.sql on every startup
spring.sql.init.mode=always

# Let GlobalExceptionHandler handle 404s as JSON
spring.mvc.throw-exception-if-no-handler-found=true
# Required to prevent default welcome page from masking 404s
spring.web.resources.add-mappings=false